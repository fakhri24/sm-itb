<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SM-ITB Matematika — Rangkuman & Latihan</title>

  <!-- KaTeX (CSS render rumus) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <!-- Font: Source Serif (judul), Inter (teks), JetBrains Mono (label teknis) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" />
  <!-- Stylesheet aplikasi -->
  <link rel="stylesheet" href="./src/css/styles.css" />
</head>
<body>
  <!-- Header & footer tetap (di luar #app) — tidak ikut dirender ulang saat pindah halaman. -->
  <header class="situs-header">
    <a href="#/" class="situs-judul">SM-ITB Matematika</a>
    <p class="situs-tagline">Rangkuman materi &amp; latihan soal persiapan Tes Mandiri ITB</p>
  </header>

  <!-- Panggung SPA: router merender view ke sini. -->
  <main id="app"></main>

  <footer class="situs-footer">
    <p>Disclaimer: konten tidak resmi, sebagai referensi tambahan dalam belajar — bukan acuan resmi ITB.</p>
  </footer>

  <!-- Library global (classic script, jalan saat di-parse). -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Bootstrap aplikasi (module, deferred -> jalan setelah library di atas siap). -->
  <script type="module" src="./src/js/app.js"></script>
</body>
</html>
